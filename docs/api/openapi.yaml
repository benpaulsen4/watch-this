openapi: 3.1.0
info:
  title: WatchThis API
  version: 0.1.0
  description: |
    OpenAPI schema for the WatchThis Next.js API routes under /api.

    Authentication is cookie-based for most routes. Clients must include the httpOnly `session` cookie.
servers:
  - url: http://localhost:3000
    description: Local development
security:
  - cookieAuth: []
tags:
  - name: Auth
  - name: Lists
  - name: Activity
  - name: Status
  - name: Schedules
  - name: Profile
  - name: TMDB
  - name: Watch
  - name: Admin
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session JWT stored in an httpOnly cookie.
    adminSecret:
      type: apiKey
      in: header
      name: x-admin-secret
      description: Shared secret for admin-only endpoints.
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    DeleteResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    StringSuccessResponse:
      type: string
      enum: [success]
    UserSummary:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: string
        username:
          type: string
        profilePictureUrl:
          type: [string, "null"]
        timezone:
          type: string
        createdAt:
          type: string
          format: date-time
    SessionGetResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
    SessionPutRequest:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
        profilePictureUrl:
          type: [string, "null"]
        timezone:
          type: string
    SessionPutResponse:
      type: object
      required: [success, user]
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
    PasskeyCredentialSummary:
      type: object
      required: [id]
      properties:
        id:
          type: string
        deviceName:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        lastUsed:
          type: [string, "null"]
          format: date-time
    WebAuthnBeginResponse:
      type: object
      required: [options]
      properties:
        options:
          type: object
          additionalProperties: true
    RegisterBeginRequest:
      type: object
      required: [username]
      additionalProperties: false
      properties:
        username:
          type: string
    RegisterVerifyRequest:
      type: object
      required: [username, registrationResponse]
      additionalProperties: true
      properties:
        username:
          type: string
        registrationResponse:
          type: object
          additionalProperties: true
        deviceName:
          type: string
        timezone:
          type: string
    AuthenticateVerifyRequest:
      type: object
      required: [authenticationResponse]
      additionalProperties: true
      properties:
        authenticationResponse:
          type: object
          additionalProperties: true
    AuthVerifyResponse:
      type: object
      required: [success, user, credential, token]
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
        credential:
          type: object
          required: [id]
          properties:
            id:
              type: string
            deviceName:
              type: [string, "null"]
            createdAt:
              type: string
              format: date-time
            lastUsed:
              type: [string, "null"]
              format: date-time
        token:
          type: string
    ClaimBeginResponse:
      type: object
      required: [options, challengeToken]
      properties:
        options:
          type: object
          additionalProperties: true
        challengeToken:
          type: string
    ClaimVerifyRequest:
      type: object
      required: [token, challengeToken, registrationResponse]
      additionalProperties: true
      properties:
        token:
          type: string
        challengeToken:
          type: string
        registrationResponse:
          type: object
          additionalProperties: true
        deviceName:
          type: string
    SignoutResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
    ListSummary:
      type: object
      required:
        [
          id,
          name,
          listType,
          isPublic,
          isArchived,
          syncWatchStatus,
          ownerId,
          createdAt,
          updatedAt,
          itemCount,
          collaborators,
          posterPaths,
        ]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: [string, "null"]
        listType:
          type: string
          enum: [movies, tv, mixed]
        isPublic:
          type: boolean
        isArchived:
          type: boolean
        syncWatchStatus:
          type: boolean
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        itemCount:
          type: integer
        collaborators:
          type: integer
        posterPaths:
          type: array
          items:
            type: string
    ListCollectionResponse:
      type: object
      required: [lists]
      properties:
        lists:
          type: array
          items:
            $ref: "#/components/schemas/ListSummary"
    ListCreateRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: [string, "null"]
        listType:
          type: string
          enum: [movies, tv, mixed]
        isPublic:
          type: boolean
        syncWatchStatus:
          type: boolean
    ListUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: [string, "null"]
        listType:
          type: string
          enum: [movies, tv, mixed]
        isPublic:
          type: boolean
        isArchived:
          type: boolean
        syncWatchStatus:
          type: boolean
    ListCreateResponse:
      type: object
      required: [list]
      properties:
        list:
          type: object
          additionalProperties: true
    ListGetResponse:
      type: object
      additionalProperties: true
    ListUpdateResponse:
      type: object
      required: [list]
      properties:
        list:
          type: object
          additionalProperties: true
    ContentType:
      type: string
      enum: [movie, tv]
    WatchStatus:
      type: string
      enum: [planning, watching, paused, completed, dropped]
    MovieWatchStatus:
      type: string
      enum: [planning, completed]
    TVWatchStatus:
      type: string
      enum: [planning, watching, paused, completed, dropped]
    TMDBContent:
      type: object
      required:
        [
          tmdbId,
          contentType,
          title,
          overview,
          posterPath,
          backdropPath,
          releaseDate,
          voteAverage,
          voteCount,
          popularity,
          genreIds,
          adult,
          watchStatus,
          statusUpdatedAt,
        ]
      properties:
        tmdbId:
          type: integer
        contentType:
          $ref: "#/components/schemas/ContentType"
        title:
          type: string
        overview:
          type: string
        posterPath:
          type: [string, "null"]
        backdropPath:
          type: [string, "null"]
        releaseDate:
          type: string
        voteAverage:
          type: number
        voteCount:
          type: integer
        popularity:
          type: number
        genreIds:
          type: array
          items:
            type: integer
        adult:
          type: [boolean, "null"]
        watchStatus:
          type: [string, "null"]
        statusUpdatedAt:
          type: [string, "null"]
    TMDBContentSearchResult:
      type: object
      required: [page, results, totalPages, totalResults]
      properties:
        page:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/TMDBContent"
        totalPages:
          type: integer
        totalResults:
          type: integer
    ActivityTimelineResponse:
      type: object
      required: [activities, upcoming, hasMore, nextCursor]
      properties:
        activities:
          type: array
          items:
            type: object
            additionalProperties: true
        upcoming:
          type: array
          items:
            type: object
            additionalProperties: true
        hasMore:
          type: boolean
        nextCursor:
          type: [string, "null"]
    ContentStatusItem:
      type: object
      required: [id, userId, tmdbId, contentType, status]
      properties:
        id:
          type: string
        userId:
          type: string
        tmdbId:
          type: integer
        contentType:
          $ref: "#/components/schemas/ContentType"
        status:
          $ref: "#/components/schemas/WatchStatus"
        nextEpisodeDate:
          type: [string, "null"]
    GetContentStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          anyOf:
            - $ref: "#/components/schemas/ContentStatusItem"
            - type: "null"
    UpsertContentStatusRequest:
      oneOf:
        - type: object
          required: [tmdbId, contentType, status]
          additionalProperties: false
          properties:
            tmdbId:
              type: integer
            contentType:
              const: movie
            status:
              $ref: "#/components/schemas/MovieWatchStatus"
        - type: object
          required: [tmdbId, contentType, status]
          additionalProperties: false
          properties:
            tmdbId:
              type: integer
            contentType:
              const: tv
            status:
              $ref: "#/components/schemas/TVWatchStatus"
    UpdateContentStatusRequest:
      oneOf:
        - type: object
          required: [tmdbId, contentType]
          additionalProperties: false
          properties:
            tmdbId:
              type: integer
            contentType:
              const: movie
            status:
              $ref: "#/components/schemas/MovieWatchStatus"
        - type: object
          required: [tmdbId, contentType]
          additionalProperties: false
          properties:
            tmdbId:
              type: integer
            contentType:
              const: tv
            status:
              $ref: "#/components/schemas/TVWatchStatus"
    ContentStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ContentStatusItem"
    EpisodeStatusItem:
      type: object
      required: [id, userId, tmdbId, seasonNumber, episodeNumber, watched, watchedAt]
      properties:
        id:
          type: string
        userId:
          type: string
        tmdbId:
          type: integer
        seasonNumber:
          type: integer
        episodeNumber:
          type: integer
        watched:
          type: boolean
        watchedAt:
          type: [string, "null"]
    EpisodeStatusListResponse:
      type: object
      required: [episodes]
      properties:
        episodes:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeStatusItem"
    UpdateEpisodeStatusRequest:
      type: object
      required: [tmdbId, seasonNumber, episodeNumber]
      properties:
        tmdbId:
          type: integer
        seasonNumber:
          type: integer
        episodeNumber:
          type: integer
        watched:
          type: boolean
    UpdateEpisodeStatusResponse:
      type: object
      required: [episode, newStatus]
      properties:
        episode:
          $ref: "#/components/schemas/EpisodeStatusItem"
        newStatus:
          type: [string, "null"]
    BatchUpdateEpisodesRequest:
      type: object
      required: [tmdbId, episodes]
      properties:
        tmdbId:
          type: integer
        episodes:
          type: array
          items:
            type: object
            required: [seasonNumber, episodeNumber, watched]
            properties:
              seasonNumber:
                type: integer
              episodeNumber:
                type: integer
              watched:
                type: boolean
    BatchUpdateEpisodesResponse:
      type: object
      required: [episodes, newStatus, syncedCollaboratorIds]
      properties:
        episodes:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeStatusItem"
        newStatus:
          type: [string, "null"]
        syncedCollaboratorIds:
          type: array
          items:
            type: string
    MarkNextEpisodeRequest:
      type: object
      required: [tmdbId]
      properties:
        tmdbId:
          type: integer
    MarkNextEpisodeResponse:
      type: object
      required: [episode, newStatus, episodeDetails]
      properties:
        episode:
          $ref: "#/components/schemas/EpisodeStatusItem"
        newStatus:
          type: [string, "null"]
        episodeDetails:
          type: object
          required: [seasonNumber, episodeNumber, name, airDate]
          properties:
            seasonNumber:
              type: integer
            episodeNumber:
              type: integer
            name:
              type: string
            airDate:
              type: string
    GetSchedulesResponse:
      type: object
      required: [schedules, totalShows]
      properties:
        schedules:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: true
        totalShows:
          type: integer
    CreateScheduleRequest:
      type: object
      required: [tmdbId, dayOfWeek]
      properties:
        tmdbId:
          type: integer
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
    DeleteSchedulesResponse:
      type: object
      required: [message, deletedSchedules]
      properties:
        message:
          type: string
        deletedSchedules:
          type: array
          items:
            type: object
            required: [id, tmdbId, dayOfWeek, createdAt]
            properties:
              id:
                type: string
              tmdbId:
                type: integer
              dayOfWeek:
                type: integer
              createdAt:
                type: string
    PasskeyDevice:
      type: object
      required: [id, credentialId, deviceName, createdAt, lastUsed]
      properties:
        id:
          type: string
        credentialId:
          type: string
        deviceName:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        lastUsed:
          type: [string, "null"]
          format: date-time
    ListDevicesResponse:
      type: object
      required: [devices]
      properties:
        devices:
          type: array
          items:
            $ref: "#/components/schemas/PasskeyDevice"
    ClaimInitiateResponse:
      type: object
      required: [claimId, claimCode, token, magicLink, qrPayload, expiresAt]
      properties:
        claimId:
          type: string
        claimCode:
          type: string
        token:
          type: string
        magicLink:
          type: string
        qrPayload:
          type: string
        expiresAt:
          type: string
          format: date-time
    ExportResponse:
      type: object
      required: [data, filename, mimetype]
      properties:
        data:
          type: string
        filename:
          type: string
        mimetype:
          type: string
    ImportResult:
      type: object
      required: [success, imported, errors]
      properties:
        success:
          type: boolean
        imported:
          type: object
          required: [lists, listItems, contentStatus, episodeStatus, tvShowSchedules]
          properties:
            lists:
              type: integer
            listItems:
              type: integer
            contentStatus:
              type: integer
            episodeStatus:
              type: integer
            tvShowSchedules:
              type: integer
        errors:
          type: array
          items:
            type: string
paths:
  /api/auth/register/begin:
    post:
      tags: [Auth]
      summary: Begin registration (passkey options)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBeginRequest"
      responses:
        "200":
          description: Returns registration options and sets registration-challenge cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnBeginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/register/verify:
    post:
      tags: [Auth]
      summary: Verify registration response and create session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterVerifyRequest"
      responses:
        "200":
          description: Returns user/session info and sets session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "400":
          description: Invalid or expired challenge / invalid registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/authenticate/begin:
    get:
      tags: [Auth]
      summary: Begin authentication (passkey options)
      security: []
      responses:
        "200":
          description: Returns authentication options and sets authentication-challenge cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnBeginResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/authenticate/verify:
    post:
      tags: [Auth]
      summary: Verify authentication response and create session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticateVerifyRequest"
      responses:
        "200":
          description: Returns user/session info and sets session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "400":
          description: Invalid or expired challenge / verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/session:
    get:
      tags: [Auth]
      summary: Get current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionGetResponse"
        "401":
          description: No session or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Auth]
      summary: Update current user profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionPutRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionPutResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No session or invalid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/claim/begin:
    get:
      tags: [Auth]
      summary: Begin claim flow for adding an additional passkey
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Options and challenge token for claim verification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimBeginResponse"
        "400":
          description: Missing token / claim not active / claim expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid claim token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Claim not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/claim/verify:
    post:
      tags: [Auth]
      summary: Verify claim registration response
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimVerifyRequest"
      responses:
        "200":
          description: Claim consumed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Missing parameters / invalid challenge / claim not active / claim expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid claim token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Claim not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/signout:
    post:
      tags: [Auth]
      summary: Sign out (clears cookies)
      security: []
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignoutResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/activity:
    get:
      tags: [Activity]
      summary: Get activity timeline
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 10
        - in: query
          name: cursor
          required: false
          schema:
            type: string
        - in: query
          name: type
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Activity feed page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityTimelineResponse"
        "400":
          description: Invalid cursor or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/lists:
    get:
      tags: [Lists]
      summary: List lists for the current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCollectionResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Lists]
      summary: Create a list
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListCreateRequest"
      responses:
        "201":
          description: List created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCreateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/lists/archived:
    get:
      tags: [Lists]
      summary: List archived lists for the current user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Archived list collection
          content:
            application/json:
