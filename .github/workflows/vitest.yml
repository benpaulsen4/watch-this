name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  vitest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install
        run: npm ci
      - name: Test
        run: npm run test
        env:
          CI: true
